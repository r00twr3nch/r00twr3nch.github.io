<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

    <div class="main-container">
        {% include sidebar.html %}

        <main class="content">
            {{ content }}
        </main>
    </div>

    <!-- Theme Toggle & Animations Script -->
    <script>
        // ==================== THEME TOGGLE ====================
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Load saved theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
            if (themeToggle) themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('light-theme');
                const isLightTheme = document.body.classList.contains('light-theme');
                localStorage.setItem('theme', isLightTheme ? 'light' : 'dark');
                themeToggle.innerHTML = isLightTheme ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }

        // ==================== SCROLL ANIMATIONS ====================
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-fade-in-up');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // Apply scroll animations on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Observe sections
            const sections = document.querySelectorAll('.section');
            sections.forEach((section, index) => {
                section.style.animationDelay = `${index * 0.1}s`;
                observer.observe(section);
            });

            // Animate skill tags
            const skillTags = document.querySelectorAll('.skill-tags span');
            skillTags.forEach((tag, index) => {
                tag.style.animationDelay = `${index * 0.05}s`;
                tag.classList.add('animate-scale-in');
            });

            // Animate timeline items
            const timelineItems = document.querySelectorAll('.timeline-item');
            timelineItems.forEach((item, index) => {
                if (index % 2 === 0) {
                    item.classList.add('animate-fade-in-left');
                } else {
                    item.classList.add('animate-fade-in-right');
                }
                item.style.animationDelay = `${index * 0.1}s`;
            });

            // Animate blog cards
            const blogCards = document.querySelectorAll('.blog-card');
            blogCards.forEach((card, index) => {
                card.classList.add('animate-scale-in');
                card.style.animationDelay = `${index * 0.1}s`;
            });

            // Animate project cards
            const projectCards = document.querySelectorAll('.project-card');
            projectCards.forEach((card, index) => {
                card.classList.add('animate-scale-in');
                card.style.animationDelay = `${index * 0.1}s`;
            });

            // Contact form validation
            const contactForm = document.getElementById('contact-form');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const message = document.getElementById('message').value;

                    if (name && email && message && isValidEmail(email)) {
                        alert('Thank you for your message! I\'ll get back to you soon.');
                        contactForm.reset();
                    } else {
                        alert('Please fill in all fields correctly.');
                    }
                });
            }
        });

        // Email validation
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                if (location.pathname.replace(/^\//,'') == this.pathname.replace(/^\//,'') && location.hostname == this.hostname) {
                    e.preventDefault();
                    const target = document.querySelector(this.hash);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });
    </script>
</body>
</html>
