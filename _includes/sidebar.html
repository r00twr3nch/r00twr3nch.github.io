<header class="sidebar">
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
        <i class="fas fa-moon"></i>
    </button>

    <div class="profile-container">
        <img src="{{ site.baseurl }}/assets/img/profile.PNG" alt="{{ site.title }}" class="profile-img">
        <h1 class="name">{{ site.title }}</h1>
        <p class="title">{{ site.description }}</p>
    </div>

    <nav class="navigation">
        <ul>
            <li><a href="{{ site.baseurl }}/#about"><i class="fas fa-user"></i> About Me</a></li>
            <li><a href="{{ site.baseurl }}/#cv"><i class="fas fa-briefcase"></i> CV & Experiences</a></li>
            <li><a href="{{ site.baseurl }}/#projects"><i class="fas fa-rocket"></i> Projects</a></li>
            <li><a href="{{ site.baseurl }}/#blog"><i class="fas fa-pen-nib"></i> Blog</a></li>
            <li><a href="{{ site.baseurl }}/#contact"><i class="fas fa-envelope"></i> Contact</a></li>
        </ul>
    </nav>

    <div class="social-links">
        <a href="https://github.com/{{ site.github_username }}" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="#" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
    </div>
</header>
